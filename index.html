<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Single Button PIN Entry</title>
<style>
*{
box-sizing:border-box;
user-select:none;
}
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:white;
}
.container{
width:760px;
max-width:95vw;
padding:40px;
background:#1e293b;
border-radius:24px;
box-shadow:0 20px 60px rgba(0,0,0,.45);
text-align:center;
}
h1{
margin:0;
font-size:40px;
}
.subtitle{
margin:12px 0 30px;
color:#cbd5e1;
}
.label{
color:#94a3b8;
font-size:18px;
}
#currentDigit{
height:70px;
line-height:70px;
font-size:64px;
font-weight:bold;
color:#facc15;
transition:.15s;
}
#selector{
display:flex;
justify-content:center;
gap:10px;
margin:20px 0;
}
.cell{
width:54px;
height:54px;
border-radius:12px;
background:#334155;
border:2px solid #475569;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
transition:.15s;
}
.cell.active{
background:#3b82f6;
border-color:#93c5fd;
box-shadow:0 0 18px #60a5fa;
transform:scale(1.1);
}
#pin{
display:flex;
justify-content:center;
gap:35px;
margin:35px 0;
}
.pinDigit{
width:30px;
font-size:50px;
font-weight:bold;
font-family:Arial,sans-serif;
}
.sliderArea{
margin:25px 0;
}
.sliderArea label{
color:#cbd5e1;
}
input[type="range"]{
width:320px;
cursor:pointer;
}
button{
width:260px;
height:75px;
border:none;
border-radius:16px;
background:#2563eb;
color:white;
font-size:26px;
font-weight:bold;
cursor:pointer;
}
button:active{
transform:scale(.98);
}
button:disabled{
opacity:.7;
cursor:default;
}
.flash{
animation:flash .4s;
}
@keyframes flash{
50%{
transform:scale(1.3);
color:#fde047;
}
}
.complete{
color:#22c55e!important;
}
</style>
</head>
<body>
<div class="container">
<h1>Enter PIN</h1>
<div class="subtitle">Hold the button to move the selector. Release to choose the highlighted digit.</div>
<div class="label">CURRENT DIGIT</div>
<div id="currentDigit">0</div>
<div id="selector"></div>
<div id="pin">
<span class="pinDigit">_</span>
<span class="pinDigit">_</span>
<span class="pinDigit">_</span>
<span class="pinDigit">_</span>
</div>

<div class="sliderArea">
<label>Speed</label>
<br>
<div style="display:flex;align-items:center;justify-content:center;gap:12px;width:320px;margin:8px auto 0;">
    <span>Slower</span>
    <input id="speedSlider" type="range" min="200" max="1000" step="50" value="600" style="flex:1; direction: rtl;">
    <span>Faster</span>
</div>
</div>


<button id="holdButton">HOLD</button>
</div>
<script>
const selector=document.getElementById("selector");
const currentDigitDisplay=document.getElementById("currentDigit");
const pinDigits=document.querySelectorAll(".pinDigit");
const button=document.getElementById("holdButton");
const speedSlider=document.getElementById("speedSlider");

const cells=[];

for(let i=0;i<10;i++){
const cell=document.createElement("div");
cell.className="cell";
cell.textContent=i;
selector.appendChild(cell);
cells.push(cell);
}

let current=0;
let timer=null;
let pressed=false;
let speed=600;

let entered=[];
let display=["_","_","_","_"];

function drawSelector(){
cells.forEach((cell,i)=>{
cell.classList.toggle("active",i===current);
});
currentDigitDisplay.textContent=current;
}

function updatePin(){
display.forEach((value,index)=>{
pinDigits[index].textContent=value;
});
}

function startScan(){
if(timer||entered.length>=4)return;
timer=setInterval(()=>{
current=(current+1)%10;
drawSelector();
},speed);
}

function stopScan(){
if(!timer)return;
clearInterval(timer);
timer=null;
selectDigit();
}

function selectDigit(){
let position=entered.length;
entered.push(current);
display[position]=current;
updatePin();

pinDigits[position].classList.add("flash");

setTimeout(()=>{
display[position]="•";
updatePin();
pinDigits[position].classList.remove("flash");

if(entered.length===4){
finish();
}
},700);
}
function finish(){

button.textContent="PIN ENTERED";
button.disabled=true;
currentDigitDisplay.textContent="✓";
currentDigitDisplay.classList.add("complete");

setTimeout(()=>{
reset();
},3000);

}

function reset(){

entered=[];
display=["_","_","_","_"];
current=0;

button.disabled=false;
button.textContent="HOLD";

currentDigitDisplay.classList.remove("complete");

drawSelector();
updatePin();

}

speedSlider.addEventListener("input",()=>{
speed=Number(speedSlider.value);

if(timer){

clearInterval(timer);

timer=setInterval(()=>{
current=(current+1)%10;
drawSelector();
},speed);

}

});

button.addEventListener("mousedown",e=>{

e.preventDefault();

if(pressed||button.disabled)return;

pressed=true;
startScan();

});

window.addEventListener("mouseup",()=>{

if(!pressed)return;

pressed=false;
stopScan();

});

button.addEventListener("touchstart",e=>{

e.preventDefault();

if(pressed||button.disabled)return;

pressed=true;
startScan();

},{passive:false});

window.addEventListener("touchend",()=>{

if(!pressed)return;

pressed=false;
stopScan();

});

drawSelector();
updatePin();

</script>
</body>
</html>
